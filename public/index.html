<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Gravity Simulation (ESM)</title>
<style>
body { margin:0; overflow:hidden; background:black; }
</style>
</head>
<body>

<script>
var Module = {
  locateFile: (p)=> p.endsWith(".wasm") ? "sim.wasm" : p
};
</script>

<script src="sim.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
    "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.webgpu.js",

    "three/examples/jsm/controls/OrbitControls.js":
      "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/controls/OrbitControls.js"
  }
}
</script>
<script type="module">

// =========================
// ES Modules import
// =========================
import * as THREE from "three";
import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";

// =========================
// スケール
// =========================
const SPACE_SCALE = 1e-9;
const HEIGHT_SCALE = 1e-6;

// =========================
// Three.js
// =========================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth/innerHeight,
  0.1,
  10000
);
camera.position.set(0,100,300);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

// =========================
// 光
// =========================
const light = new THREE.PointLight(0xffffff,2);
scene.add(light);

// =========================
// 天体
// =========================
let simStep, getCount, getPositions, getPotential;
const meshes = [];

// =========================
// 重力の布
// =========================
const gridSize = 100;
const geometry = new THREE.PlaneGeometry(400,400,gridSize,gridSize);
geometry.rotateX(-Math.PI/2);

const material = new THREE.MeshBasicMaterial({
  color:0x4444ff,
  wireframe:true
});

const plane = new THREE.Mesh(geometry,material);
scene.add(plane);

// =========================
// 初期化
// =========================
Module.onRuntimeInitialized = ()=>{

  Module.ccall("init_simulation");

  simStep      = Module.cwrap("step");
  getCount     = Module.cwrap("get_count","number",[]);
  getPositions = Module.cwrap("get_positions","number",[]);
  getPotential = Module.cwrap("getPotential","number",["number","number"]);

  createBodies();
  animate();
};

// =========================
function createBodies(){

  const n = getCount();

  for(let i=0;i<n;i++){

    const geo = new THREE.SphereGeometry(i===0?5:2,32,32);
    const mat = new THREE.MeshStandardMaterial({
      color: i===0 ? 0xffff00 : 0x3399ff
    });

    const m = new THREE.Mesh(geo,mat);
    scene.add(m);

    meshes.push(m);
  }
}

// =========================
// ループ
// =========================
function animate(){

  requestAnimationFrame(animate);

  simStep();

  const ptr = getPositions();
  const count = getCount();

  const arr = new Float64Array(Module.HEAPF64.buffer,ptr,count*3);

  for(let i=0;i<count;i++){

    const x = arr[i*3]*SPACE_SCALE;
    const y = arr[i*3+1]*SPACE_SCALE;
    const z = arr[i*3+2]*SPACE_SCALE;

    meshes[i].position.set(x,y,z);

    if(i===0){
      light.position.set(x,y,z);
    }
  }

  // 重力ポテンシャル
  const pos = plane.geometry.attributes.position;

  for(let i=0;i<pos.count;i++){

    let x = pos.getX(i) / SPACE_SCALE;
    let z = pos.getZ(i) / SPACE_SCALE;

    let y = getPotential(x,z) * HEIGHT_SCALE;

    pos.setY(i, y);
  }

  pos.needsUpdate = true;

  controls.update();
  renderer.render(scene,camera);
}

// =========================
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
