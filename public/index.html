<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpaceSIM</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" rel="stylesheet"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js"></script>
<script src="sim.js"></script>

<style>
html,body,#cesiumContainer{width:100%;height:100%;margin:0;padding:0;overflow:hidden;}
</style>
</head>

<body>
<div id="cesiumContainer"></div>

<script>

/*************************************************
 * 🌍 Cesium初期化
 *************************************************/
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJmZGE4MmUyMi05NjNkLTRjYmMtODA4ZS0zN2IzZjRjMWJmMWQiLCJpZCI6NDEwNjgzLCJpYXQiOjE3NzQ3NjkwMjR9.kmZ-78Pd2Av_yYcwF4mlTsj1dqZ8U4irvd4SoNsjdLI";

const viewer = new Cesium.Viewer("cesiumContainer", {
  shouldAnimate: true,
  selectionIndicator: false,
  infoBox: false,
});

/*************************************************
 * 🛰️ Starlink
 *************************************************/
const starlink = [];

async function loadSatellites(){
  const txt = await fetch("starlink.txt").then(r=>r.text());

  const lines = txt.split("\n").filter(l=>l.trim()!=="");

  for(let i=0;i<lines.length;i+=3){
    if(!lines[i+1] || !lines[i+2]) continue;

    const rec = satellite.twoline2satrec(lines[i+1],lines[i+2]);

    const entity = viewer.entities.add({
      position: computePos(rec,new Date()),
      point:{pixelSize:6,color:Cesium.Color.WHITE}
    });

    starlink.push({record:rec,entity});
  }
}

function computePos(rec,date){
  const gmst = satellite.gstime(date);
  const p = satellite.propagate(rec,date).position;
  if(!p) return Cesium.Cartesian3.ZERO;

  const geo = satellite.eciToGeodetic(p,gmst);

  return Cesium.Cartesian3.fromRadians(
    geo.longitude,
    geo.latitude,
    geo.height*1000
  );
}

setInterval(()=>{
  const now=new Date();
  starlink.forEach(s=>{
    const pos = computePos(s.record,now);
    if(pos) s.entity.position = pos;
  });
},1000);

loadSatellites();

/*************************************************
 * 🌌 WASM宇宙シミュ
 *************************************************/
let simStep, getCount, getPositions;

const simEntities = [];
const simTrails = [];
const trailLen = 80;

Module.onRuntimeInitialized=()=>{
  Module.ccall("init_simulation");

  simStep = Module.cwrap("step");
  getCount = Module.cwrap("get_count","number",[]);
  getPositions = Module.cwrap("get_positions","number",[]);

  createBodies();
  loop();
};

/*************************************************
 * 🌍 天体生成
 *************************************************/
function createBodies(){
  const n = getCount();

  for(let i=0;i<n;i++){
    const e = viewer.entities.add({
      position:new Cesium.Cartesian3(),
      ellipsoid:{
        radii:new Cesium.Cartesian3(1000,1000,1000),
        material:Cesium.Color.CYAN
      }
    });

    e._trail = viewer.entities.add({
      polyline:{positions:[],width:2,material:Cesium.Color.ORANGE}
    });

    simEntities.push(e);
    simTrails.push([]);
  }
}

/*************************************************
 * 🔄 メインループ
 *************************************************/
function loop(){
  simStep();

  const count = getCount();
  const ptr   = getPositions();

  if(!ptr || count<=0){
    requestAnimationFrame(loop);
    return;
  }

  const positions = new Float64Array(
    Module.HEAPF64.buffer,
    ptr,
    count * 3
  );

  for(let i=0;i<count;i++){

    const x = positions[i*3];
    const y = positions[i*3+1];
    const z = positions[i*3+2];

    if(!isFinite(x)||!isFinite(y)||!isFinite(z)) continue;
    if(!simEntities[i]) continue;

    const pos = new Cesium.Cartesian3(
      x*1000,
      y*1000,
      z*1000
    );

    simEntities[i].position = pos;

    simTrails[i].push(pos);
    if(simTrails[i].length>trailLen) simTrails[i].shift();

    simEntities[i]._trail.polyline.positions = simTrails[i];
  }

  requestAnimationFrame(loop);
}

/*************************************************
 * 🎥 カメラ
 *************************************************/
viewer.camera.setView({
  destination:new Cesium.Cartesian3(0,5e7,8e7)
});

/*************************************************
 * 🖱️ クリック追従
 *************************************************/
new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas)
.setInputAction(click=>{
  const picked = viewer.scene.pick(click.position);
  if(picked && picked.id){
    viewer.trackedEntity = picked.id;
  }
},Cesium.ScreenSpaceEventType.LEFT_CLICK);

</script>
</body>
</html>
