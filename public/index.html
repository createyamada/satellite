<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>SpaceSim Three.js</title>
<style>
body { margin:0; overflow:hidden; background:black; }
</style>
</head>
<body>

<script src="https://unpkg.com/three@0.155.0/build/three.min.js"></script>

<script>
var Module = {
  locateFile: function(path) {
    if (path.endsWith(".wasm")) return "sim.wasm";
    return path;
  }
};
</script>

<script src="sim.js"></script>

<script>

// =========================
// 🌌 スケール設定
// =========================
const SPACE_SCALE = 1e-9;   // m → 表示
const VISUAL_SCALE = 1e-6;  // 重力可視化

// =========================
// 🎮 Three.js 初期化
// =========================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1e9
);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// カメラ位置
camera.position.z = 200;

// ライト
const light = new THREE.PointLight(0xffffff, 2);
scene.add(light);

// =========================
// WASM
// =========================
let simStep, getCount, getPositions;

const bodies = [];
const trails = [];
const trailLen = 100;

// =========================
// 初期化
// =========================
Module.onRuntimeInitialized = () => {

  Module.ccall("init_simulation");

  simStep      = Module.cwrap("step");
  getCount     = Module.cwrap("get_count","number",[]);
  getPositions = Module.cwrap("get_positions","number",[]);

  createBodies();
  animate();
};

// =========================
// 🌍 天体生成
// =========================
function createBodies(){

  const n = getCount();

  for(let i=0;i<n;i++){

    const geo = new THREE.SphereGeometry(2, 16, 16);
    const mat = new THREE.MeshBasicMaterial({color:0x00ffff});

    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);

    bodies.push(mesh);
    trails.push([]);
  }
}

// =========================
// 🔄 メインループ
// =========================
function animate(){

  requestAnimationFrame(animate);

  simStep();

  const count = getCount();
  const ptr   = getPositions();

  if(ptr){

    const positions = new Float64Array(
      Module.HEAPF64.buffer,
      ptr,
      count * 3
    );

    for(let i=0;i<count;i++){

      let x = positions[i*3]   * SPACE_SCALE;
      let y = positions[i*3+1] * SPACE_SCALE;
      let z = positions[i*3+2] * SPACE_SCALE;

      bodies[i].position.set(x, y, z);

      // 軌跡
      trails[i].push(new THREE.Vector3(x,y,z));
      if(trails[i].length > trailLen) trails[i].shift();

      drawTrail(i);
    }
  }

  renderer.render(scene, camera);
}

// =========================
// ✨ 軌跡描画
// =========================
function drawTrail(i){

  if(bodies[i].trail){
    scene.remove(bodies[i].trail);
  }

  const geometry = new THREE.BufferGeometry().setFromPoints(trails[i]);
  const material = new THREE.LineBasicMaterial({color:0xffaa00});

  const line = new THREE.Line(geometry, material);

  bodies[i].trail = line;
  scene.add(line);
}

// =========================
// 🖱️ 操作
// =========================
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
