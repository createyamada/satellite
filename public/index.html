<script>

// =========================
// 🌌 スケール
// =========================
const SPACE_SCALE = 1e-9; // ← これ重要（見えるように）

// =========================
// 🎮 初期化
// =========================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1e9
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 背景
scene.background = new THREE.Color(0x000000);

// =========================
// ☀️ 太陽ライト
// =========================
const light = new THREE.PointLight(0xffffff, 3);
scene.add(light);

// =========================
// WASM
// =========================
let simStep, getCount, getPositions;

const bodies = [];
const trails = [];
const trailLen = 200;

// =========================
// 初期化
// =========================
Module.onRuntimeInitialized = () => {

  Module.ccall("init_simulation");

  simStep      = Module.cwrap("step");
  getCount     = Module.cwrap("get_count","number",[]);
  getPositions = Module.cwrap("get_positions","number",[]);

  createBodies();
  animate();
};

// =========================
// 🌍 天体生成
// =========================
function createBodies(){

  const n = getCount();

  for(let i=0;i<n;i++){

    let color = 0x00ffff;
    let size  = 2;

    if(i === 0){
      // ☀️ 太陽
      color = 0xffff00;
      size  = 8;
    }else{
      // 🌍 惑星
      color = 0x3399ff;
      size  = 3;
    }

    const geo = new THREE.SphereGeometry(size, 32, 32);
    const mat = new THREE.MeshStandardMaterial({color:color});

    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);

    bodies.push(mesh);
    trails.push([]);
  }
}

// =========================
// 🔄 メインループ
// =========================
function animate(){

  requestAnimationFrame(animate);

  simStep();

  const count = getCount();
  const ptr   = getPositions();

  if(ptr){

    const positions = new Float64Array(
      Module.HEAPF64.buffer,
      ptr,
      count * 3
    );

    for(let i=0;i<count;i++){

      let x = positions[i*3]   * SPACE_SCALE;
      let y = positions[i*3+1] * SPACE_SCALE;
      let z = positions[i*3+2] * SPACE_SCALE;

      bodies[i].position.set(x, y, z);

      // 太陽をライト位置に
      if(i === 0){
        light.position.set(x,y,z);
      }

      // 軌道
      trails[i].push(new THREE.Vector3(x,y,z));
      if(trails[i].length > trailLen) trails[i].shift();

      drawTrail(i);
    }
  }

  // 🎥 カメラを太陽に向ける
  camera.lookAt(bodies[0].position);

  renderer.render(scene, camera);
}

// =========================
// ✨ 軌道描画
// =========================
function drawTrail(i){

  if(bodies[i].trail){
    scene.remove(bodies[i].trail);
  }

  const geometry = new THREE.BufferGeometry().setFromPoints(trails[i]);
  const material = new THREE.LineBasicMaterial({color:0xffffff});

  const line = new THREE.Line(geometry, material);

  bodies[i].trail = line;
  scene.add(line);
}

// =========================
// 🎥 カメラ位置（重要）
// =========================
camera.position.set(0, 100, 300);

// =========================
// リサイズ
// =========================
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
