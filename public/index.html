<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Relativity Gravity</title>

<style>
body { margin:0; overflow:hidden; background:white; }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
    "three/examples/jsm/controls/OrbitControls.js":
      "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/controls/OrbitControls.js"
  }
}
</script>

<script>
var Module = {
  locateFile: (p)=> p.endsWith(".wasm") ? "sim.wasm" : p,
  onRuntimeInitialized: function () {
    const wait = setInterval(() => {
      if (window.startApp) {
        clearInterval(wait);
        window.startApp();
      }
    }, 10);
  }
};
</script>

<script src="sim.js"></script>
</head>

<body>

<script type="module">

import * as THREE from "three";
import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";

const G = 6.67430e-11;
const c = 299792458;

const SPACE_SCALE = 1e-9;

// =========================
// Three.js
// =========================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth / innerHeight,
  0.1,
  100000
);
camera.position.set(0, 500, 2000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0xffffff, 1);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

// 光
scene.add(new THREE.AmbientLight(0xffffff, 0.3));

const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(200,300,200);
scene.add(light);

// =========================
// グリッド（線）
// =========================
const gridSize = 150;

const geometry = new THREE.PlaneGeometry(2000, 2000, gridSize, gridSize);
geometry.rotateX(-Math.PI/2);

const material = new THREE.MeshBasicMaterial({
  color: 0x000000,
  wireframe: true
});

const plane = new THREE.Mesh(geometry, material);
scene.add(plane);

// =========================
// WASM
// =========================
let simStep, getCount, getPositions, getMasses;

window.startApp = function () {

  Module.ccall("init_simulation");

  simStep      = Module.cwrap("step");
  getCount     = Module.cwrap("get_count", "number", []);
  getPositions = Module.cwrap("get_positions", "number", []);
  getMasses    = Module.cwrap("get_masses", "number", []);

  animate();
};

// =========================
// アニメーション
// =========================
function animate(){

  requestAnimationFrame(animate);

  simStep();

  const count = getCount();

  const posPtr = getPositions();
  const arr = new Float64Array(Module.HEAPF64.buffer, posPtr, count * 3);

  const massPtr = getMasses();
  const masses = new Float64Array(Module.HEAPF64.buffer, massPtr, count);

  const pos = plane.geometry.attributes.position;

  for(let i=0;i<pos.count;i++){

    let x = pos.getX(i) / SPACE_SCALE * 50;
    let z = pos.getZ(i) / SPACE_SCALE * 50;

    let y = 0;

    for(let j=0;j<count;j++){

      const bx = arr[j*3];
      const bz = arr[j*3+2];
      const m  = masses[j];

      const dx = x - bx;
      const dz = z - bz;

      const dist = Math.sqrt(dx*dx + dz*dz) + 1e6;

      const rs = (2 * G * m) / (c*c);

      const warp = 2 * Math.sqrt(Math.abs(rs * (dist - rs)));

      y += warp * 1e-6;
    }

    pos.setY(i, y);
  }

  pos.needsUpdate = true;
  plane.geometry.computeVertexNormals();

  controls.update();
  renderer.render(scene, camera);
}

</script>
</body>
</html>
